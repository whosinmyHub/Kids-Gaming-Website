<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berry Many Numbers</title>
    <style>
        
        body {
            background-color: antiquewhite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;

        }
        h1 {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            color:coral;
            text-align: center;

        }
        .gameSpace {
            position: relative;
            width: 900px;
            height: 600px;
        }
        #gameArea {
            width: 900px;
            height: 600px;
            border: 4px solid white;
        }
        #basket {
            position: absolute;
            top: 0px;
            left: 0px;
            z-index: 10; 
            height: 130px; 
        }

        #blueberry {
            position: absolute;
            top: -600px;
            left: -900px;
            z-index: 5; 
            height: 60px; 
        }
        #strawberry {
            position: absolute;
            top: -600px;
            left: -900px;
            z-index: 5; 
            height: 60px; 
        }
        
        .scoreBoard {
            position: relative;
            bottom: 600px;
            left: 580px;
            width: 220px;
            height: 610px;
            background-color: #F5B482;


            text-align: center;
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            font-size: 22px;
            
        }
        #points {
            position: absolute;
            top: 130px;
            width: 110px;
            height: 110px;
            margin-left: 5%;
            background-color: aliceblue;

            font-size: 70px;
        }
        p {
            position: absolute;
            top: 70px;
            left: 16%;
            font-size: 22px;
        }

        .modes {
            position: absolute;
            top: 50%;
            left: 25%;
        }
       
       
      
    </style>
</head>
<body>
    <h1>Berry Many Numbers</h1>
    <div class="gameSpace">
        <canvas id="gameArea"></canvas> 
    
        <img id="basket" src="/images/basket.png">

        <img id="blueberry" src="/images/blueberry.png">
        <img id="strawberry" src="/images/strawberry.png">

        <div class="modes">
            <button id="play-mode">No Math Mode</button>
            <button id="easy-mode">Easy Math Mode</button>
            <button id="medium-mode">Medium Math Mode</button>
            <button id="hard-mode">Hard Math Mode</button>
        </div>
        
    </div>

    <div class="scoreBoard">Score-Board
        <p>Points</p>
        <div id="points">0</div>
    </div>

    <script type="module" src="berry-game.js"></script>
    
</body>
</html>
